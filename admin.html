<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>관리자 대시보드</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body class="admin-page">

<!-- 토스트 알림 -->
<div class="toast" id="toast"></div>

<div class="admin-wrap">

  <!-- 사이드바: 학생 목록 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">⚙️ 관리자</span>
      <button class="btn-logout" id="logoutBtn">로그아웃</button>
    </div>
    <div class="sidebar-label">질문한 학생</div>
    <ul class="student-list" id="studentList">
      <li class="list-empty">질문한 학생이 없습니다</li>
    </ul>

    <div class="sidebar-tools">
      <!-- 삭제 이력 -->
      <div class="tools-label">삭제 이력</div>
      <div class="reset-status">
        <div class="reset-row">
          <span class="reset-key">마지막 삭제</span>
          <span class="reset-val" id="lastResetVal">기록 없음</span>
        </div>
      </div>

      <!-- 수동 전체 삭제 -->
      <div class="tools-label" style="margin-top:10px">수동 삭제</div>
      <button class="btn-clear-all" id="clearAllBtn">⚠️ 전체 채팅 삭제</button>
    </div>
  </aside>

  <!-- 메인: 채팅 패널 -->
  <div class="admin-chat">
    <header class="chat-header" id="chatHeader">
      <div class="chat-header-info">
        <span class="chat-title">학생을 선택하세요</span>
      </div>
    </header>

    <main class="messages" id="messages">
      <div class="msg-empty" id="msgEmpty">왼쪽에서 학생을 선택하면 대화 내용이 표시됩니다.</div>
    </main>

    <footer class="input-area" id="inputArea" style="display:none">
      <textarea id="msgInput" placeholder="답변을 입력하세요… (Shift+Enter: 줄바꿈)" rows="1" maxlength="1000"></textarea>
      <button class="btn-send" id="sendBtn" disabled>전송</button>
    </footer>
  </div>

</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInAnonymously }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
         getDoc, setDoc, getDocs, query, orderBy, onSnapshot, serverTimestamp, Timestamp }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { FIREBASE_CONFIG } from "./js/config.js";

// ── 관리자 인증 확인 ──
const user = JSON.parse(sessionStorage.getItem("user") || "null");
if (!user || !user.isAdmin) { location.href = "index.html"; }

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

const SETTINGS_REF = doc(db, "settings", "chatReset");

let selectedThreadId = null;
let unsubMessages    = null;

onAuthStateChanged(auth, async (fbUser) => {
  if (!fbUser) { await signInAnonymously(auth); return; }
  await loadLastReset();
  initAdmin();
});

// ──────────────────────────────────────────────
// 마지막 삭제 시각 불러오기 (자동 삭제 없음)
// ──────────────────────────────────────────────
async function loadLastReset() {
  let snap;
  try {
    snap = await getDoc(SETTINGS_REF);
  } catch (e) {
    console.error("settings 읽기 실패:", e);
    return;
  }

  if (!snap.exists() || !snap.data().lastResetAt) {
    document.getElementById("lastResetVal").textContent = "기록 없음";
    return;
  }

  updateResetUI(snap.data().lastResetAt.toMillis());
}

// ── 마지막 삭제 시각 표시 ──
function updateResetUI(lastResetAtMs) {
  if (!lastResetAtMs) {
    document.getElementById("lastResetVal").textContent = "기록 없음";
    return;
  }
  const d = new Date(lastResetAtMs);
  document.getElementById("lastResetVal").textContent =
    d.toLocaleString("ko-KR", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
}

// ──────────────────────────────────────────────
// 학생 목록 실시간 구독
// ──────────────────────────────────────────────
function initAdmin() {
  const q = query(collection(db, "chat_threads"), orderBy("lastMessageAt", "desc"));
  onSnapshot(q, snap => renderStudentList(snap));
}

function renderStudentList(snap) {
  const list = document.getElementById("studentList");
  list.innerHTML = "";

  if (snap.empty) {
    list.innerHTML = '<li class="list-empty">질문한 학생이 없습니다</li>';
    return;
  }

  snap.forEach(docSnap => {
    const d  = docSnap.data();
    const li = document.createElement("li");
    li.className = `student-item${docSnap.id === selectedThreadId ? " active" : ""}${d.hasUnread ? " unread" : ""}`;
    li.innerHTML = `
      <span class="s-name">${esc(d.studentName)}</span>
      <span class="s-id">${esc(d.studentId)}</span>
      <span class="s-last">${esc(d.lastMessage || "")}</span>`;
    li.addEventListener("click", () => selectThread(docSnap.id, d));
    list.appendChild(li);
  });
}

// ──────────────────────────────────────────────
// 학생 스레드 선택
// ──────────────────────────────────────────────
function selectThread(threadId, data) {
  selectedThreadId = threadId;

  document.getElementById("chatHeader").innerHTML = `
    <div class="chat-header-info">
      <span class="chat-title">${esc(data.studentName)}</span>
      <span class="chat-sub">${esc(data.studentId)}</span>
    </div>`;
  document.getElementById("inputArea").style.display = "flex";

  document.querySelectorAll(".student-item").forEach(el => {
    el.classList.toggle("active", el.querySelector(".s-id")?.textContent === data.studentId);
  });

  if (unsubMessages) unsubMessages();

  const q = query(
    collection(db, "chat_threads", threadId, "messages"),
    orderBy("createdAt", "asc")
  );
  unsubMessages = onSnapshot(q, snap => renderMessages(snap, threadId));
  updateDoc(doc(db, "chat_threads", threadId), { hasUnread: false });
}

// ──────────────────────────────────────────────
// 메시지 렌더링
// ──────────────────────────────────────────────
function renderMessages(snap, threadId) {
  const box   = document.getElementById("messages");
  const empty = document.getElementById("msgEmpty");

  empty.style.display = snap.empty ? "block" : "none";
  box.querySelectorAll(".msg-row").forEach(el => el.remove());

  snap.forEach(msgSnap => {
    const data = msgSnap.data();
    const row  = document.createElement("div");
    row.className = `msg-row ${data.role === "admin" ? "mine" : "theirs"}`;

    const time = data.createdAt?.toDate
      ? data.createdAt.toDate().toLocaleTimeString("ko-KR", { hour:"2-digit", minute:"2-digit" })
      : "";

    if (data.role === "student") {
      row.innerHTML = `
        <div class="msg-avatar">${esc(data.studentName?.[0] || "학")}</div>
        <div class="msg-body">
          <div class="bubble">${esc(data.text)}</div>
          <div class="msg-foot">
            <span class="msg-time">${time}</span>
            <button class="btn-del" data-tid="${threadId}" data-mid="${msgSnap.id}">삭제</button>
          </div>
        </div>`;
    } else {
      row.innerHTML = `
        <div class="msg-body">
          <div class="bubble">${esc(data.text)}</div>
          <div class="msg-foot right">
            <button class="btn-del" data-tid="${threadId}" data-mid="${msgSnap.id}">삭제</button>
            <span class="msg-time">${time}</span>
          </div>
        </div>`;
    }
    box.appendChild(row);
  });

  box.querySelectorAll(".btn-del").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!confirm("이 메시지를 삭제할까요?")) return;
      await deleteDoc(doc(db, "chat_threads", btn.dataset.tid, "messages", btn.dataset.mid));
    });
  });

  box.scrollTop = box.scrollHeight;
}

// ──────────────────────────────────────────────
// 답변 전송
// ──────────────────────────────────────────────
const input   = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");

input.addEventListener("input", () => {
  autoResize(input);
  sendBtn.disabled = !input.value.trim();
});
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendReply(); }
});
sendBtn.addEventListener("click", sendReply);

async function sendReply() {
  if (!selectedThreadId) return;
  const text = input.value.trim();
  if (!text) return;
  sendBtn.disabled = true;
  input.value = "";
  autoResize(input);

  await addDoc(collection(db, "chat_threads", selectedThreadId, "messages"), {
    text, role: "admin", createdAt: serverTimestamp()
  });
  await updateDoc(doc(db, "chat_threads", selectedThreadId), {
    lastMessage: text.substring(0, 40),
    lastMessageAt: serverTimestamp(),
    hasUnread: false
  });
}

// ──────────────────────────────────────────────
// 스레드 + 메시지 일괄 삭제 헬퍼
// ──────────────────────────────────────────────
async function deleteThread(threadId) {
  const msgsSnap = await getDocs(
    collection(db, "chat_threads", threadId, "messages")
  );
  await Promise.all(msgsSnap.docs.map(m => deleteDoc(m.ref)));
  await deleteDoc(doc(db, "chat_threads", threadId));

  if (selectedThreadId === threadId) {
    selectedThreadId = null;
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
    document.getElementById("chatHeader").innerHTML = `
      <div class="chat-header-info">
        <span class="chat-title">학생을 선택하세요</span>
      </div>`;
    document.getElementById("inputArea").style.display = "none";
    document.getElementById("msgEmpty").style.display  = "block";
    document.getElementById("messages").querySelectorAll(".msg-row").forEach(e => e.remove());
  }
}

// ──────────────────────────────────────────────
// 수동 전체 삭제
// ──────────────────────────────────────────────
document.getElementById("clearAllBtn").addEventListener("click", async () => {
  const allSnap = await getDocs(collection(db, "chat_threads"));

  if (allSnap.empty) { alert("삭제할 채팅이 없습니다."); return; }

  if (!confirm(`모든 학생의 채팅 ${allSnap.size}개를 전부 삭제합니다.\n이 작업은 되돌릴 수 없습니다.\n\n계속할까요?`)) return;
  if (!confirm("다시 한번 확인합니다. 전체 채팅을 삭제하시겠습니까?")) return;

  const btn = document.getElementById("clearAllBtn");
  btn.disabled = true;
  btn.textContent = "삭제 중…";

  try {
    await Promise.all(allSnap.docs.map(d => deleteThread(d.id)));
    const now = Date.now();
    await setDoc(SETTINGS_REF, { lastResetAt: Timestamp.fromMillis(now) });
    updateResetUI(now);
    showToast(`전체 채팅 ${allSnap.size}개가 삭제되었습니다.`);
  } catch (e) {
    console.error(e);
    alert("삭제 중 오류가 발생했습니다.");
  } finally {
    btn.disabled = false;
    btn.textContent = "⚠️ 전체 채팅 삭제";
  }
});

// ──────────────────────────────────────────────
// 유틸
// ──────────────────────────────────────────────
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 4000);
}

document.getElementById("logoutBtn").addEventListener("click", () => {
  sessionStorage.clear(); location.href = "index.html";
});
</script>
</body>
</html>
